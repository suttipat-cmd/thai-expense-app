<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>บันทึกรายรับรายจ่าย</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <div class="app-shell">
    <main id="app" class="app-main" aria-live="polite"></main>

    <nav class="bottom-nav" aria-label="เมนูหลัก">
      <button class="nav-button" type="button" data-route="home" aria-label="หน้าแรก">
        <span class="nav-icon">⌂</span>
        <span>หน้าแรก</span>
      </button>
      <button class="nav-button" type="button" data-route="list" aria-label="รายการ">
        <span class="nav-icon">☷</span>
        <span>รายการ</span>
      </button>
      <button class="nav-button nav-add" type="button" data-route="add" aria-label="เพิ่มรายการ">
        <span class="nav-plus">＋</span>
        <span>เพิ่ม</span>
      </button>
      <button class="nav-button" type="button" data-route="summary" aria-label="สรุป">
        <span class="nav-icon">◔</span>
        <span>สรุป</span>
      </button>
    </nav>
  </div>

  <section id="settingsDialog" class="modal" hidden aria-modal="true" role="dialog" aria-labelledby="settingsTitle">
    <div class="modal-backdrop" data-action="close-settings"></div>
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="settingsTitle">ตั้งค่าการเชื่อมต่อ</h2>
        <button class="icon-button" type="button" data-action="close-settings" aria-label="ปิด">×</button>
      </div>
      <p class="muted small">
        ถ้ายังไม่ใส่ URL ระบบจะใช้ข้อมูลในเครื่องนี้ก่อน เมื่อตั้งค่า Apps Script แล้วจึงเชื่อมกับ Google Sheet ได้
      </p>
      <label class="field">
        <span>Apps Script Web App URL</span>
        <input id="settingApiUrl" type="url" inputmode="url" placeholder="https://script.google.com/macros/s/.../exec">
      </label>
      <label class="field">
        <span>Token</span>
        <input id="settingToken" type="password" autocomplete="off" placeholder="ใส่ token เดียวกับใน Apps Script">
      </label>
      <div class="modal-actions">
        <button class="secondary-button" type="button" data-action="test-api">ทดสอบ</button>
        <button class="primary-button" type="button" data-action="save-settings">บันทึก</button>
      </div>
      <button class="link-button danger-text" type="button" data-action="clear-local">ล้างข้อมูลในเครื่อง</button>
    </div>
  </section>

  <div id="toast" class="toast" hidden></div>
</body>
</html>
