<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>บันทึกรายรับรายจ่าย</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <div class="app-shell">
    <main id="app" class="app-main" aria-live="polite"></main>

    <nav class="bottom-nav" aria-label="เมนูหลัก">
      <button class="nav-button" type="button" data-route="home" aria-label="หน้าแรก">
        <span class="nav-icon">⌂</span>
        <span>หน้าแรก</span>
      </button>
      <button class="nav-button" type="button" data-route="list" aria-label="รายการ">
        <span class="nav-icon">☷</span>
        <span>รายการ</span>
      </button>
      <button class="nav-button nav-add" type="button" data-route="add" aria-label="เพิ่มรายการ">
        <span class="nav-plus">＋</span>
        <span>เพิ่ม</span>
      </button>
      <button class="nav-button" type="button" data-route="summary" aria-label="สรุป">
        <span class="nav-icon">◔</span>
        <span>สรุป</span>
      </button>
    </nav>
  </div>

  <div id="toast" class="toast" hidden></div>

  <noscript>
    <div class="noscript-box">เว็บนี้ต้องเปิดใช้งาน JavaScript ก่อนจึงจะใช้งานได้</div>
  </noscript>
</body>
</html>
